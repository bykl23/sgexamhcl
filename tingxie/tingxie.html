let g='p3', v='v1';
function set(gr) { g=gr; render(); }
function setV(vr) { v=vr; render(); }

function render() {
  document.querySelectorAll('.controls button').forEach(b=>b.classList.remove('active'));
  document.getElementById(`btn-${g}`).classList.add('active');
  document.getElementById(`btn-${v}`).classList.add('active');
  const box = document.getElementById('content'); box.innerHTML='';
  D[g].forEach((ls, i) => {
    const p = document.createElement('div'); p.className='lesson-page';
    const isV1 = v==='v1';
    let rows = ls.w.map(w => {
      if(isV1) return `<tr><td>${w[0]}</td><td>${w[1]}</td></tr>`;
      return `<tr><td>${w[1]}</td><td></td><td></td></tr>`;
    }).join('');
    const hd = isV1 ? `<thead><tr><th style="width:40%">汉字词语</th><th style="width:60%">拼音</th></tr></thead>` : `<thead><tr><th style="width:30%">拼音提示</th><th style="width:35%">默写汉字</th><th style="width:35%">英文意思</th></tr></thead>`;
    p.innerHTML = `
      <h2 class="lesson-title">${ls.t}</h2>
      <div class="student-info"><span>姓名：________________</span><span>日期：______________</span><span>得分：____ / ${ls.w.length}</span></div>
      <table>${hd}<tbody>${rows}</tbody></table>`;
    box.appendChild(p);
  });
}
render();
</script>
